version: '3.8'

services:
  pdf-rag-app:
    build: .
    container_name: pdf-rag-system
    ports:
      - "7860:7860"
    volumes:
      # Mount data directory for persistent storage
      - ./data:/app/data
      # Mount uploads directory
      - ./uploads:/app/uploads
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
